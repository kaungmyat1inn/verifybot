services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: tgbot_verify
      MYSQL_USER: tgbot_user
      MYSQL_PASSWORD: 123456
    volumes:
      - db_data:/var/lib/mysql

  tgbot:
    build: .
    container_name: sheerid-tgbot
    restart: unless-stopped
    depends_on:
      - db

    # 环境变量
    environment:
      - TZ=Asia/Yangon
      - PYTHONUNBUFFERED=1
      # Telegram Bot 配置
      - BOT_TOKEN=${BOT_TOKEN}
      - CHANNEL_USERNAME=${CHANNEL_USERNAME:-pk_oa}
      - CHANNEL_URL=${CHANNEL_URL:-https://t.me/pk_oa}
      - ADMIN_USER_ID=${ADMIN_USER_ID}
      # MySQL配置
      - MYSQL_HOST=db # <‑‑ container name of the db service
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER:-tgbot_user}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-123456}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-tgbot_verify}

    # 日志持久化
    volumes:
      - ./logs:/app/logs

    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  db_data:
